<script>
  (function (JSON, Response) {
    function getDebugElement() {
      const root = document.getElementById("djDebugRoot");
      if (root) {
        return (root.shadowRoot || root).querySelector("#djDebug");
      }
      return document.getElementById("djDebug");
    }

    function update(data) {
      if (data === null || !data.hasOwnProperty("debugToolbar")) return data;

      const djDebug = getDebugElement();
      if (!djDebug) {
        delete data.debugToolbar;
        return data;
      }
      
      Object.entries(data.debugToolbar.panels).map(([id, panel]) => {
        if (panel.title) {
          const content = djDebug.querySelector(`#${id}`);
          if (content) {
            const titleEl = content.querySelector(".djDebugPanelTitle h3");
            if (titleEl) {
              titleEl.textContent = panel.title;
            }

            const scrollEl = content.querySelector(".djdt-scroll");
            if (scrollEl) {
              scrollEl.innerHTML = "";
            }

            if (content.querySelector(".djdt-loader") === null) {
              const loader = document.createElement("div");
              loader.className = "djdt-loader";
              const panelContent = content.querySelector(".djDebugPanelContent");
              if (panelContent) {
                panelContent.prepend(loader);
              }
            }
          }
        }
        if (panel.subtitle) {
          const panelButton = djDebug.querySelector(`#djdt-${id}`);
          if (panelButton) {
            const smallEl = panelButton.querySelector("small");
            if (smallEl) {
              smallEl.textContent = panel.subtitle;
            }
          }
        }
      });

      djDebug.setAttribute("data-request-id", data.debugToolbar.requestId);
      delete data.debugToolbar;
      return data;
    }

    const origParse = JSON.parse;
    JSON.parse = function (text) {
      return update(origParse(text));
    };

    const origJson = Response.prototype.json;
    Response.prototype.json = function () {
      return origJson.apply(this, arguments).then((data) => update(data));
    };

  })(JSON, Response);
</script>
